<style>
  .achievement-wrap {
    width: min(94vw, 800px);
    margin: 0 auto;
    font-size: 1.02rem;
  }
  .achievement-note {
    margin: 0 0 8px;
    color: #475569;
    font-size: 0.95rem;
  }
  .achievement-heading {
    margin: 28px 0 12px;
    padding: 10px 18px;
    border-left: 6px solid #8db9b2;
    background: linear-gradient(90deg, #eef7f4 0%, #f6fafc 100%);
    color: #475569;
    font-size: 1.275rem;
    line-height: 1.35;
    font-weight: 700;
  }
  .achievement-subheading {
    margin: 14px 0 6px;
    color: #475569;
    font-size: 1.08rem;
    line-height: 1.35;
    font-weight: 700;
  }
  .achievement-list {
    margin: 0;
    padding: 0;
    list-style: none;
    border-top: 1px solid rgba(148, 163, 184, 0.25);
  }
  .achievement-item {
    display: grid;
    grid-template-columns: 44px 1fr;
    gap: 8px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(148, 163, 184, 0.25);
  }
  .achievement-index {
    color: #0f172a;
    text-align: center;
    font-weight: 600;
  }
  .achievement-title {
    margin: 0 0 2px;
    color: #020617;
    font-size: 1.02rem;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .achievement-title a {
    color: inherit;
    text-decoration: inherit;
    text-underline-offset: inherit;
    font-size: inherit;
    font-weight: inherit;
  }
  .achievement-title a::after {
    content: " 🖇";
    font-size: 0.9em;
    font-weight: 700;
  }
  .achievement-authors,
  .achievement-meta {
    margin: 0;
    max-width: none;
    font-size: 1.02rem;
    line-height: 1.24;
  }
  .achievement-meta {
    color: #2f8f83;
    font-weight: 700;
  }
  .dark .achievement-note,
  .dark .achievement-heading,
  .dark .achievement-subheading,
  .dark .achievement-authors {
    color: #cbd5e1;
  }
  .dark .achievement-title,
  .dark .achievement-index {
    color: #f8fafc;
  }
  .dark .achievement-heading {
    border-left-color: #9ccbc4;
    background: linear-gradient(90deg, rgba(141, 185, 178, 0.22) 0%, rgba(120, 154, 181, 0.12) 100%);
  }
</style>

<div class="achievement-wrap">
{{ if eq .Site.Language.Lang "en" }}
  {{ partial "achievements/en.html" . }}
{{ else }}
  {{ partial "achievements/zh.html" . }}
{{ end }}
</div>
